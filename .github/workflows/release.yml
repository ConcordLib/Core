name: CI & Release

# Build, test, pack, and release in one pipeline. The full game-dependent solution
# (Concord.slnx) is not buildable on hosted runners, so this exercises Concord.ci.slnx,
# which excludes the runtime adapters and TestMod (they reference game assemblies via
# a local GameDir).
#
# The file is named release.yml because nuget.org Trusted Publishing pins the OIDC policy
# to a workflow filename; the publish job must live in release.yml for the token to validate.
#
# The release job depends on the full test matrix (test) and the mono leg (test-mono),
# so a release cannot cut or publish unless every required test leg passes. It only runs
# on pushes to main (not PRs): semantic-release cuts the v* tag + GitHub Release, then the
# job packs Concord.Ref, Concord.Analyzers, and Concord.Runtime (versions stamped from the
# tag by MinVer) and publishes to nuget.org via Trusted Publishing (OIDC -> short-lived
# API key; no stored key). --skip-duplicate makes a re-run on the same commit idempotent.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          # global.json (10.0.100, rollForward latestFeature) pins the exact SDK;
          # '10.0.x' here ensures the matching band is installed and available.

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', 'global.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Concord.ci.slnx

      - name: Build
        run: dotnet build Concord.ci.slnx -c Release --no-restore

      # Produce the compile-time-only Concord.Ref nupkg (ref/ folder, no lib/).
      - name: Pack reference assembly
        run: dotnet pack src/Concord.Ref/Concord.Ref.csproj -c Release -o artifacts

      - name: Upload runtime assembly
        uses: actions/upload-artifact@v4
        with:
          name: concord-runtime
          path: |
            Assemblies/net10.0/Concord.dll
            Assemblies/netstandard2.0/Concord.dll
          if-no-files-found: error

      - name: Upload ref package
        uses: actions/upload-artifact@v4
        with:
          name: concord-ref-nupkg
          path: artifacts/Concord.Ref.*.nupkg
          if-no-files-found: error

  test:
    name: Test · ${{ matrix.label }}
    needs: build
    runs-on: ${{ matrix.runner }}
    # fail-fast off so one flaky platform doesn't cancel the rest; experimental cells
    # (arm64 / x64-on-intel-mac) don't fail the overall run until promoted below.
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Canonical trio — required (experimental: false).
          - { label: linux-x64,    runner: ubuntu-24.04,   experimental: false }
          - { label: windows-x64,  runner: windows-latest, experimental: false }
          - { label: macos-arm64,  runner: macos-latest,   experimental: false }
          # Extended coverage — informational until green, then flip experimental to false.
          # macos-x64 (macos-13, Intel) is dropped: GitHub is retiring Intel mac runners, so
          # it is slow/scarce to allocate and stalled every release without ever completing.
          # Apple Silicon macOS is still covered by the required macos-arm64 cell.
          - { label: linux-arm64,  runner: ubuntu-24.04-arm, experimental: true }
          - { label: windows-arm64,runner: windows-11-arm,   experimental: true }
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', 'global.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Concord.ci.slnx

      - name: Test
        run: dotnet test Concord.ci.slnx -c Release --no-restore -f net10.0 --logger trx --results-directory test-results

      - name: Test (net472)
        if: startsWith(matrix.runner, 'windows')
        run: |
          dotnet test tests/Concord.Detour.Tests/Concord.Detour.Tests.csproj -c Release --no-restore -f net472
          dotnet test tests/Concord.Emit.Tests/Concord.Emit.Tests.csproj -c Release --no-restore -f net472
          dotnet test tests/Concord.AttachedData.Tests/Concord.AttachedData.Tests.csproj -c Release --no-restore -f net472
          dotnet test tests/Concord.Orchestration.Tests/Concord.Orchestration.Tests.csproj -c Release --no-restore -f net472

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.label }}
          path: test-results/**/*.trx

  test-mono:
    name: Test · mono (net472)
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install mono
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', 'global.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Concord.ci.slnx

      - name: Build net472 test assemblies
        run: dotnet build Concord.ci.slnx -c Release --no-restore

      - name: Run suites under mono
        run: |
          set -e
          # Pick the newest cached runner. A stale older xunit.runner.console (e.g. 2.9.2)
          # left in the cache would make mono fail to load the tests' xunit.assert 2.9.3 with
          # a FileNotFoundException; sort -V | tail -1 selects the version the restore pulled.
          RUNNER=$(find ~/.nuget/packages/xunit.runner.console -name xunit.console.exe -path '*net472*' | sort -V | tail -1)
          for dll in Detour Emit AttachedData Orchestration; do
            mono "$RUNNER" "tests/Concord.$dll.Tests/bin/Release/net472/Concord.$dll.Tests.dll"
          done

  release:
    name: Release & Publish
    needs: [test, test-mono]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write        # semantic-release: push tag, create GitHub Release
      issues: write          # semantic-release: comment on resolved issues
      pull-requests: write   # semantic-release: comment on merged PRs
      id-token: write        # Trusted Publishing: GitHub OIDC token for NuGet login
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # semantic-release walks commit history; MinVer reads tags

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', 'global.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      # A build for packing only; the test/test-mono jobs already gated correctness.
      - name: Build
        run: dotnet build Concord.ci.slnx -c Release

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # conventionalcommits preset: the angular default ignores the `!`
        # breaking-change shorthand; the preset package must be installed alongside.
        run: npx -y -p semantic-release@24 -p conventional-changelog-conventionalcommits@9 semantic-release

      # semantic-release tags HEAD when it cuts a release; no tag means nothing to publish.
      - name: Detect release tag
        id: tag
        run: |
          TAG=$(git tag --points-at HEAD | grep '^v' | head -1 || true)
          if [ -n "$TAG" ]; then
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Publishing $TAG"
          else
            echo "No release tag on HEAD; skipping publish."
          fi

      - name: Pack
        if: steps.tag.outputs.tag != ''
        run: |
          dotnet pack src/Concord.Ref/Concord.Ref.csproj -c Release -o artifacts
          dotnet pack src/Concord.Analyzers/Concord.Analyzers.csproj -c Release -o artifacts
          dotnet pack src/Concord/Concord.csproj -c Release -o artifacts

      - name: NuGet login
        if: steps.tag.outputs.tag != ''
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish to nuget.org
        if: steps.tag.outputs.tag != ''
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Announce on Discord
        if: steps.tag.outputs.tag != ''
        continue-on-error: true
        env:
          WEBHOOK: ${{ secrets.NEO_MODS_DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NOTES=$(gh release view "${{ steps.tag.outputs.tag }}" --json body -q .body | head -c 1600)
          URL=$(gh release view "${{ steps.tag.outputs.tag }}" --json url -q .url)
          CONTENT=$(printf '**Concord %s** — now on NuGet\n\n%s\n\n%s' "${{ steps.tag.outputs.tag }}" "$NOTES" "$URL")
          STATUS=$(curl -sS -o response.txt -w '%{http_code}' -X POST "${WEBHOOK}?thread_id=1522736349583638711&wait=true" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg c "$CONTENT" '{content:$c, allowed_mentions:{parse:[]}}')")
          echo "Discord HTTP $STATUS"
          cat response.txt
          if [ "$STATUS" -ge 400 ]; then
            echo "::warning::Discord announce failed with HTTP $STATUS (release itself is unaffected)"
          fi
